# docker-compose.yml
services:
  db:
    image: postgres:15
    container_name: poc-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: attendance_system
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d attendance_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: poc-mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password123!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssqldata:/var/opt/mssql

  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      mssql:
        condition: service_started
    environment:
      DB_HOST: db
      MSSQL_HOST: mssql
      PG_CONTAINER: poc-postgres
      MSSQL_CONTAINER: poc-mssql
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
  mssqldata:
